root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main cmd/server/main.go"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules", ".git"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "yaml", "yml", "toml"]
  kill_delay = 500
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[misc]
  clean_on_exit = true
