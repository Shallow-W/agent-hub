server:
  port: 8080
  # Optional. Set to a LAN/public reachable URL (e.g. "http://10.0.0.1:8080")
  # for daemon connect commands. Auto-detects LAN IP when empty.
  external_url: ""
database:
  host: localhost
  port: 5432
  user: agenthub
  password: agenthub
  dbname: agenthub
  sslmode: disable
redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
jwt:
  secret: dev-secret-change-in-prod
  expiry_hours: 48
daemon:
  token: dev-daemon-token-change-in-prod
cors:
  allowed_origins:
    - http://localhost:5173
upload:
  dir: "./uploads"
  # Optional. Set to a public backend origin such as "http://111.228.35.61:8080"
  # or "https://agenthub.example.com" so attachment APIs return absolute URLs.
  public_base_url: ""
  max_image_mb: 20
  max_pdf_mb: 50
log:
  level: info
rate_limit:
  rps: 100
  burst: 200
